<section class="section-card">
  <h2>History</h2>

  <div *ngIf="!isLoggedIn" class="login-note">
    Login is required to view history.
  </div>

  <div *ngIf="isLoggedIn" class="history-box">
    <div class="history-header">
      <h3>My History</h3>
      <button (click)="loadMyHistory()" [disabled]="isLoading">
        {{ isLoading ? 'Loading...' : 'Load My History' }}
      </button>
    </div>

    <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>

    <app-history-table [operations]="myHistory"></app-history-table>

    <div *ngIf="isAdmin" class="admin-section">
      <h3>Admin Controls</h3>
      <p>You can view history of any user by entering their User ID below.</p>
      <app-admin-history-panel></app-admin-history-panel>
    </div>
  </div>
</section>
